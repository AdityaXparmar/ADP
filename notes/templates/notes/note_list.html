{% load custom_filters %}
<!DOCTYPE html>
<html>
<head>
    <title>My Notes</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            margin-top: 40px;
        }

        .note-card {
            border-radius: 12px;
            transition: 0.3s;
        }

        .note-card:hover {
            transform: scale(1.01);
        }

        mark {
            background-color: yellow;
            padding: 2px 5px;
            border-radius: 5px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .add-btn {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>

<body>

<div class="container">

    
    <div class="header">
        <h2>📝 My Notes</h2>
    </div>

    
    <form method="GET" class="d-flex mb-4">
        <input type="text" name="q" class="form-control me-2" 
               placeholder="Search notes..." value="{{ query }}">
        <button class="btn btn-success">Search</button>
    </form>

    
    <a href="{% url 'note_create' %}" class="btn btn-primary add-btn">+ Add Note</a>

    
    {% for note in notes %}
    <div class="card mb-3 shadow-sm note-card">
        <div class="card-body">

    
            <h5 class="card-title">
                {{ note.title|highlight:query|safe }}
            </h5>

         
            <p class="card-text">
                {{ note.content|highlight:query|safe }}
            </p>

          
            <a href="{% url 'note_update' note.id %}" class="btn btn-warning btn-sm">Edit</a>
            <a href="{% url 'note_delete' note.id %}" class="btn btn-danger btn-sm">Delete</a>

        </div>
    </div>

    {% empty %}
        <div class="alert alert-info text-center">
            No notes found 
        </div>
    {% endfor %}

</div>

</body>
</html>
