<!DOCTYPE html>
<html>
<head>
    <title>Note Form</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="col-md-6 offset-md-3 form-box shadow">
        <h3 class="text-center mb-4">
            {% if note %}Edit{% else %}Add{% endif %} Note
        </h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" value="{{ note.title }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea name="content" class="form-control" rows="4">{{ note.content }}</textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">Save</button>
        </form>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
